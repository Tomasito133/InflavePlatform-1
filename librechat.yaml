version: 1.3.5
cache: true

endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "meta-llama/llama-3-70b-instruct"
        fetch: true
      titleConvo: true
      titleModel: "meta-llama/llama-3-70b-instruct"
      dropParams:
        - "stop"
      modelDisplayLabel: "OpenRouter"

mcpServers:
  googledrive:
    type: streamable-http
    url: https://googledrive.run.tools
    requiresOAuth: true
    initTimeout: 150000
    timeout: 120000
    startup: false
    serverInstructions: true

  notion:
    type: streamable-http
    url: https://notion.run.tools
    requiresOAuth: true
    initTimeout: 150000
    timeout: 120000
    startup: false
    serverInstructions: true
